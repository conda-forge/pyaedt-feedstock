{% set name = "pyaedt" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyaedt-{{ version }}.tar.gz
  sha256: 58faf088979a70cf972a82539e09788721d85cb788820c30744be61cf98fcf09

build:
  skip: true  # [osx or py<310]
  number: 1

outputs:
  - name: pyaedt-base
    build:
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - dotnet-sdk ~=7.0  # [linux]
        - mono              # [linux]
      host:
        - pip
        - python
        - setuptools
      run:
        - python
        - ansys-tools-common
        - defusedxml >=0.7
        - grpcio >=1.50.0
        - jsonschema
        - numpy >=1.20.0
        - psutil >=6.0.0
        - pydantic >=2.6.4
        - pyyaml
        - pyedb >=0.75.0
        - tomli
        - tomli-w
    test:
      imports:
        - ansys.aedt.core
      commands:
        - pip check
        - pip list
        - python -c "from ansys.aedt.core import __version__; print(__version__)"
      requires:
        - pip
        - python {{ python_min }}

  - name: pyaedt-dotnet
    requirements:
      run:
        - {{ pin_subpackage('pyaedt-base', exact=True) }}
        - mono                  # [linux]
        - dotnet-runtime ~=7.0  # [linux]
        - cffi >=1.16.0         # [linux]
        - ansys-pythonnet >=3.1.0rc3
        - pywin32 >=303         # [win]
    test:
      imports:
        - ansys.aedt.core
        - ansys.aedt.core.internal.clr_module
      requires:
        - python {{ python_min }}

  - name: pyaedt-graphics
    requirements:
      run:
        - {{ pin_subpackage('pyaedt-base', exact=True) }}
        - ansys-tools-visualization-interface
        # pyvista[io] extra — explicitly listed (conda has no extras syntax)
        - pyvista >=0.38.0,<0.48
        - imageio
        - meshio >=5.2
        # 
        - matplotlib-base
        - vtk >=9.0,<9.7
        - fpdf2
        - pillow
    test:
      imports:
        - ansys.aedt.core
        - ansys.aedt.core.visualization.plot.pdf
        - ansys.aedt.core.visualization.plot.matplotlib
        - ansys.aedt.core.visualization.plot.pyvista
      requires:
        - python {{ python_min }}

  - name: pyaedt
    requirements:
      run:
        - {{ pin_subpackage('pyaedt-dotnet', exact=True) }}
        - {{ pin_subpackage('pyaedt-graphics', exact=True) }}
        - openpyxl >=3.1.0
        - pandas >=1.1.0
        - fast-simplification >=0.1.7
        - scikit-rf >=0.30.0
        - rpyc >=6.0.0
        - requests
    test:
      imports:
        - ansys.aedt.core
      requires:
        - python {{ python_min }}

about:
  home: https://pypi.org/project/pyaedt/
  summary: Higher-Level Pythonic Ansys Electronics Desktop Framework
  license: MIT AND BSD-3-Clause
  license_file:
    - LICENSE
  doc_url: https://aedt.docs.pyansys.com/
  dev_url: https://github.com/pyansys/pyaedt

extra:
  recipe-maintainers:
    - SMoraisAnsys
    - MaxJPRey
    - maxcapodi78
    - Samuelopez-ansys
