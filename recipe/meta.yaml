{% set name = "pyaedt" %}
{% set version = "0.26.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyaedt-{{ version }}.tar.gz
  sha256: 04b00fecd9eb6ed1135d274b558077369cbe714232372afa7a4e962b3e3989c2

build:
  skip: true  # [osx or py<310]
  number: 1

outputs:
  - name: pyaedt-base
    build:
      script: $PYTHON -m pip install . -vv --no-deps     # [not win]
      script: "%PYTHON% -m pip install . -vv --no-deps"  # [win]
    requirements:
      build:
        - mono              # [linux]
        - dotnet-sdk ~=7.0  # [linux]
      host:
        - python {{ python_min }}
        - setuptools
        - pip
      run:
        - python >={{ python_min }}
        - ansys-tools-common
        - defusedxml >=0.7,<8.0
        - grpcio >=1.50.0,<1.81
        - jsonschema
        - numpy >=1.20.0,<2.3
        - psutil >=6.0.0
        - pydantic >=2.6.4,<2.14
        - pyyaml
        - pyedb ==0.74.0
        - tomli
        - tomli-w

    test:
      imports:
        - ansys.aedt.core
      commands:
        - pip list
        - python -c "from ansys.aedt.core import __version__; print(__version__)"
      requires:
        - pip
        - python {{ python_min }}

  - name: pyaedt-dotnet
    requirements:
      run:
        - {{ pin_subpackage('pyaedt-base', exact=True) }}
        - mono                  # [linux]
        - dotnet-runtime ~=7.0  # [linux]
        - cffi >=1.16.0,<2.1    # [linux]
        - ansys-pythonnet >=3.1.0rc3
        - pywin32 >=303         # [win]
    test:
      imports:
        - ansys.aedt.core
        - ansys.aedt.core.internal.clr_module
      requires:
        - python {{ python_min }}

  - name: pyaedt-graphics
    requirements:
      run:
        - {{ pin_subpackage('pyaedt-base', exact=True) }}
        - ansys-tools-visualization-interface
        # pyvista[io] extra — explicitly listed (conda has no extras syntax)
        - pyvista >=0.38.0,<0.48
        - imageio
        - meshio >=5.2
        # 
        - matplotlib-base
        - vtk >=9.0,<9.7
        - fpdf2
        - pillow
    test:
      imports:
        - ansys.aedt.core
        - ansys.aedt.core.visualization.plot.fpdf
        - ansys.aedt.core.visualization.plot.matplotlib
        - ansys.aedt.core.visualization.plot.pyvista
      requires:
        - python {{ python_min }}

  - name: pyaedt
    requirements:
      run:
        - {{ pin_subpackage('pyaedt-dotnet', exact=True) }}
        - {{ pin_subpackage('pyaedt-graphics', exact=True) }}
        - openpyxl >=3.1.0,<3.3
        - pandas >=1.1.0,<2.4
        - fast-simplification >=0.1.7
        - scikit-rf >=0.30.0,<1.12
        - rpyc >=6.0.0,<6.1
        - requests
    test:
      imports:
        - ansys.aedt.core
      requires:
        - python {{ python_min }}

about:
  home: https://pypi.org/project/pyaedt/
  summary: Higher-Level Pythonic Ansys Electronics Desktop Framework
  license: MIT AND BSD-3-Clause
  license_file:
    - LICENSE
  doc_url: https://aedt.docs.pyansys.com/
  dev_url: https://github.com/pyansys/pyaedt

extra:
  recipe-maintainers:
    - SMoraisAnsys
    - MaxJPRey
    - maxcapodi78
    - Samuelopez-ansys
